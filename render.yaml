databases:
  - name: mindyourlanguage-db
    plan: free
    region: oregon

services:
  - type: web
    name: mindyourlanguage
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run import-cedict && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPL_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NATIVE_ALT_MODEL
        value: gpt-4o-mini
      - key: RATE_LIMIT_PER_MIN
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: mindyourlanguage-db
          property: connectionString
